<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#06060f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Pulse Chat</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">

    <!-- WebSocket libs -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.1/stomp.min.js"></script>

    <link rel="stylesheet" href="chat.css">
</head>

<body>

    <!-- 3D animated background canvas -->
    <canvas id="bgCanvas"></canvas>

    <!-- ════════════ JOIN SCREEN ════════════ -->
    <div id="joinScreen">

        <div class="join-logo">
            <div class="logo-icon">⚡</div>
            <h1>Pulse Chat</h1>
        </div>

        <p class="join-label">Your Name</p>
        <input id="nameInput" class="join-input" type="text" placeholder="How should we call you?" autocomplete="off">

        <button id="createRoomBtn" class="btn-primary mb-16">✦ Create New Room</button>

        <div id="createdRoomBox" style="display:none">
            <div class="code-box" id="codeBox">
                <div class="code-value" id="generatedCode"></div>
                <div class="code-hint">Tap to copy · Share with friends</div>
            </div>
            <button id="enterCreatedBtn" class="btn-primary mb-16">Enter Room →</button>
        </div>

        <div class="divider">or join existing</div>

        <p class="join-label">Room Code</p>
        <input id="roomInput" class="join-input room-code-input" type="text" maxlength="8" placeholder="Enter room code"
            autocomplete="off">

        <button id="joinRoomBtn" class="btn-outline">Join Room</button>
    </div>

    <!-- ════════════ CHAT SCREEN ════════════ -->
    <div id="chatScreen">

        <!-- Members Sidebar / Drawer -->
        <div id="membersDrawer">
            <div class="drawer-header">
                <div class="drawer-brand">
                    <div class="drawer-icon">⚡</div>
                    <span class="drawer-brand-name">Pulse</span>
                </div>
                <button class="drawer-close" id="drawerClose">✕</button>
            </div>
            <div class="room-chip-wrap">
                <div class="room-chip" id="sidebarRoomPill">
                    <div class="rc-dot"></div>
                    <span id="sidebarRoomCode">——</span>
                </div>
            </div>
            <div class="members-section-label">
                Online <span class="member-count-badge" id="memberCount">0</span>
            </div>
            <div id="membersList"></div>
        </div>
        <div id="drawerBackdrop"></div>

        <!-- Main chat column -->
        <div class="chat-main">

            <div class="chat-header">
                <div class="header-info">
                    <div class="header-title" id="headerRoomTitle">Room ——</div>
                    <div class="header-meta">
                        <span class="online-dot"></span>
                        <span id="headerMeta">Connected</span>
                    </div>
                </div>
                <span class="room-pill" id="roomPill"></span>
                <button class="members-toggle" id="membersToggle" aria-label="Members">
                    👥<span class="members-badge" id="membersBadge">0</span>
                </button>
                <button class="btn-leave" id="leaveBtn">Leave</button>
            </div>

            <div id="chat">
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">💬</div>
                    <p>Be the first to say something…</p>
                </div>
            </div>

            <div id="typingBar"></div>

            <div class="chat-footer">
                <div id="emojiPanel"></div>
                <button class="emoji-toggle-btn" id="emojiToggle" aria-label="Emoji">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M8 13s1.5 2 4 2 4-2 4-2" />
                        <line x1="9" y1="9" x2="9.01" y2="9" />
                        <line x1="15" y1="9" x2="15.01" y2="9" />
                    </svg>
                </button>
                <input id="messageInput" type="text" placeholder="Message…">
                <button id="sendBtn" disabled>
                    <svg viewBox="0 0 24 24" width="16" height="16">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="currentColor" />
                    </svg>
                </button>
            </div>

        </div>
    </div>

    <script src="bg3d.js"></script>
    <script src="chat.js"></script>
</body>

</html>
